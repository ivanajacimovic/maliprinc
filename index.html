  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

">Ograđeno dvorište od 400 kvadrata, sa mekanom podlogom i hladom. Boravak napolju je deo svakog dana, i zimi.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff;\">\n        <div style=\"width:56px; height:56px; border-radius:50%; background:#FFF3D6; display:flex; align-items:center; justify-content:center;\"><svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 32 32\" fill=\"none\"><rect x=\"5\" y=\"7\" width=\"22\" height=\"18\" rx=\"2\" stroke=\"#C98A1B\" stroke-width=\"2\"><\u002Frect><path d=\"M16 7v18\" stroke=\"#C98A1B\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family: 'Baloo 2',sans-serif; font-weight: 600; font-size: 22px; margin: 16px 0 8px; color: #E9AE2E\">Priprema za školu<\u002Fh3>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Predškolci uče slova, brojeve i rad u grupi. Program vodi vaspitač sa licencom za pripremni predškolski program.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff;\">\n        <div style=\"width:56px; height:56px; border-radius:50%; background:#E3EFFF; display:flex; align-items:center; justify-content:center;\"><svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 32 32\" fill=\"none\"><path d=\"M6 24V10l10-4 10 4v14\" stroke=\"#3D6FCC\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"16\" cy=\"17\" r=\"3\" stroke=\"#3D6FCC\" stroke-width=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family: 'Baloo 2',sans-serif; font-weight: 600; font-size: 22px; margin: 16px 0 8px; color: #3D70CC\">Engleski svaki dan<\u002Fh3>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Kratko i kroz pesme, 20 minuta dnevno od treće godine. Deca do polaska u školu razumeju jednostavne rečenice.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff;\">\n        <div style=\"width:56px; height:56px; border-radius:50%; background:var(--mekana); display:flex; align-items:center; justify-content:center;\"><svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 32 32\" fill=\"none\"><circle cx=\"16\" cy=\"16\" r=\"11\" stroke=\"var(--tamna)\" stroke-width=\"2\"><\u002Fcircle><path d=\"M16 5c4 3 4 19 0 22M5 16h22\" stroke=\"var(--tamna)\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family: 'Baloo 2',sans-serif; font-weight: 600; font-size: 22px; margin: 16px 0 8px; color: #4D9B45\">Sport<\u002Fh3>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Utorkom i četvrtkom trener vodi vežbanje u sali: poligoni, lopte, osnovna gimnastika. Sve prilagođeno uzrastu.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff;\">\n        <div style=\"width:56px; height:56px; border-radius:50%; background:#FFF3D6; display:flex; align-items:center; justify-content:center;\"><svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 32 32\" fill=\"none\"><path d=\"M8 26c0-8 4-18 16-20-2 12-8 18-16 20Z\" stroke=\"#C98A1B\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family: 'Baloo 2',sans-serif; font-weight: 600; font-size: 22px; margin: 16px 0 8px; color: #E9AE2E\">Kreativne radionice<\u002Fh3>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Crtanje, glina, pozorište senki. Radove deca nose kući petkom, a jednom godišnje pravimo izložbu za roditelje.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff;\">\n        <div style=\"width:56px; height:56px; border-radius:50%; background:#E3EFFF; display:flex; align-items:center; justify-content:center;\"><svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 32 32\" fill=\"none\"><path d=\"M  border-bottom:1px solid #D8E8D3;\"><span style=\"width:10px; height:10px; border-radius:50%; background:var(--zuta); flex-shrink:0; margin-top:9px;\"><\u002Fspan><span style=\"font-weight:700; color:var(--tamna); width:86px; flex-shrink:0;\">10.30<\u002Fspan><span>dvorište i užina<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:20px; padding:14px 0; border-bottom:1px solid #D8E8D3;\"><span style=\"width:10px; height:10px; border-radius:50%; background:var(--zuta); flex-shrink:0; margin-top:9px;\"><\u002Fspan><span style=\"font-weight:700; color:var(--tamna); width:86px; flex-shrink:0;\">12.00<\u002Fspan><span>ručak<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:20px; padding:14px 0; border-bottom:1px solid #D8E8D3;\"><span style=\"width:10px; height:10px; border-radius:50%; background:var(--zuta); flex-shrink:0; margin-top:9px;\"><\u002Fspan><span style=\"font-weight:700; color:var(--tamna); width:86px; flex-shrink:0;\">13.00<\u002Fspan><span>spavanje za mlađe, mirne aktivnosti za predškolce<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:20px; padding:14px 0; border-bottom:1px solid #D8E8D3;\"><span style=\"width:10px; height:10px; border-radius:50%; background:var(--zuta); flex-shrink:0; margin-top:9px;\"><\u002Fspan><span style=\"font-weight:700; color:var(--tamna); width:86px; flex-shrink:0;\">15.30<\u002Fspan><span>užina<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:20px; padding:14px 0;\"><span style=\"width:10px; height:10px; border-radius:50%; background:var(--zuta); flex-shrink:0; margin-top:9px;\"><\u002Fspan><span style=\"font-weight:700; color:var(--tamna); width:86px; flex-shrink:0;\">16.00<\u002Fspan><span>igra do polaska kući<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"grupe\" style=\"position:relative; max-width:1100px; margin:0 auto; padding:var(--pad) 24px;\">\n    <svg width=\"110\" height=\"86\" sc-camel-view-box=\"0 0 110 86\" fill=\"none\" style=\"position:absolute; top:calc(var(--pad) - 6px); right:40px; filter:url(#crayon);\"><rect x=\"8\" y=\"42\" width=\"36\" height=\"36\" rx=\"3\" stroke=\"var(--tamna)\" stroke-width=\"3\" transform=\"rotate(-4 26 60)\"><\u002Frect><rect x=\"56\" y=\"44\" width=\"36\" height=\"36\" rx=\"3\" stroke=\"#E9AE2E\" stroke-width=\"3\" transform=\"rotate(5 74 62)\"><\u002Frect><rect x=\"32\" y=\"6\" width=\"36\" height=\"36\" rx=\"3\" stroke=\"#3D6FCC\" stroke-width=\"3\" transform=\"rotate(-7 50 24)\"><\u002Frect><text x=\"20\" y=\"70\" font-family=\"Baloo 2\" font-size=\"20\" font-weight=\"700\" fill=\"var(--tamna)\" transform=\"rotate(-4 26 60)\">A<\u002Ftext><text x=\"68\" y=\"72\" font-family=\"Baloo 2\" font-size=\"20\" font-weight=\"700\" fill=\"#E9AE2E\" transform=\"rotate(5 74 62)\">B<\u002Ftext><text x=\"44\" y=\"34\" font-family=\"Baloo 2\" font-size=\"20\" font-weight=\"700\" fill=\"#3D6FCC\" transform=\"rotate(-7 50 24)\">V<\u002Ftext><\u002Fsvg>\n    <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(30px,3.5vw,40px); margin:0 0 12px;\">Grupe<\u002Fh2>\n    <p style=\"max-width:34em; margin:0 0 48px; color:var(--sivi);\">Tri grupe, podeljene po uzrastu. Svaku vode dva vaspitača sa licencom Ministarstva prosvete, a medicinska sestra je u vrtiću ceo dan.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px;\">\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff; border-top:4px solid var(--zelena);\">\n        <h3 style=\"font-family:'Baloo 2',sans-serif; font-weight:600; font-size:22px; margin:0 0 4px;\">Jaslice<\u002Fh3>\n        <p style=\"margin:0 0 12px; font-weight:700; color:var(--tamna);\">1 do 3 godine · do 10 dece<\u002Fp>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Uz dva vaspitača u jaslicama je i medicinska sestra. Ritam spavanja i obroka prilagođavamo svakom detetu.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff; border-top:4px solid var(--zuta);\">\n        <h3 style=\"font-family:'Baloo 2',sans-serif; font-weight:600; font-size:22px; margin:0 0 4px;\">Mlađa grupa<\u002Fh3>\n        <p style=\"margin:0 0 12px; font-weight:700; color:var(--tamna);\">3 do 5 godina · do 12 dece<\u002Fp>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Najviše igre i dvorišta. Tu kreću engleski, sport i radionice, sve u kratkim blokovima od po 20 minuta.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E4E2D8; border-radius:18px; padding:28px; background:#fff; border-top:4px solid var(--plava);\">\n        <h3 style=\"font-family:'Baloo 2',sans-serif; font-weight:600; font-size:22px; margin:0 0 4px;\">Predškolska grupa<\u002Fh3>\n        <p style=\"margin:0 0 12px; font-weight:700; color:var(--tamna);\">5 do 7 godina · do 14 dece<\u002Fp>\n        <p style=\"margin:0; color:var(--sivi); font-size:16px;\">Pripremni predškolski program koji zamenjuje obavezni u državnom vrtiću. Dobijate potvrdu za upis u školu.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"prostor\" style=\"background:#fff; border-top:1px solid #E4E2D8; border-bottom:1px solid #E4E2D8;\">\n    <div style=\"position:relative; max-width:1100px; margin:0 auto; padding:var(--pad) 24px;\">\n      <svg width=\"96\" height=\"90\" sc-camel-view-box=\"0 0 96 90\" fill=\"none\" style=\"position:absolute; top:calc(var(--pad) - 8px); right:40px; filter:url(#crayon); transform:rotate(4deg);\"><path d=\"M16 44 48 16l32 28M24 40v38h48V40\" stroke=\"var(--tamna)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><rect x=\"40\" y=\"56\" width=\"16\" height=\"22\" stroke=\"#E9AE2E\" stroke-width=\"3\"><\u002Frect><path d=\"M60 24v-8h8v14\" stroke=\"var(--tamna)\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(30px,3.5vw,40px); margin:0 0 12px;\">Prostor i sigurnost<\u002Fh2>\n      <p style=\"max-width:34em; margin:0 0 48px; color:var(--sivi);\">Kuća sa dvorištem, bez spratova i stepenica za decu. Ulaz se otključava karticom, a dvorište je ograđeno i pod video nadzorom. Najbolje je da dođete i sve vidite uživo.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; grid-auto-rows:300px;\">\n        <image-slot id=\"prostor-dvoriste\" shape=\"rounded\" radius=\"12\" placeholder=\"FOTOGRAFIJA: dvorište sa igralištem\"><\u002Fimage-slot>\n        <image-slot id=\"prostor-soba\" shape=\"rounded\" radius=\"12\" placeholder=\"FOTOGRAFIJA: soba za boravak\"><\u002Fimage-slot>\n        <image-slot id=\"prostor-trpezarija\" shape=\"rounded\" radius=\"12\" placeholder=\"FOTOGRAFIJA: trpezarija\"><\u002Fimage-slot>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1100px; margin:0 auto; padding:var(--pad) 24px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:56px; align-items:center;\">\n    <div style=\"height:400px;\">\n      <image-slot id=\"tim-foto\" shape=\"rounded\" radius=\"16\" placeholder=\"FOTOGRAFIJA: tim vaspitača\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div>\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(30px,3.5vw,40px); margin:0 0 12px;\">Ko brine o deci<\u002Fh2>\n      <p style=\"max-width:32em; color:var(--sivi); margin:0 0 16px;\">Osam vaspitača, svi sa licencom i završenim fakultetom ili višom školom za vaspitače. Pet ih je u vrtiću duže od deset godina, pa deca često dobiju istog vaspitača kog je imao stariji brat ili sestra.<\u002Fp>\n      <p style=\"max-width:32em; color:var(--sivi); margin:0 0 16px;\">Medicinska sestra ujutru pregleda decu na prijemu i vodi računa o terapijama i alergijama. Kuvarica sprema doručak, dve užine i ručak u našoj kuhinji, po nedeljnom jelovniku koji roditelji dobijaju unapred.<\u002Fp>\n      <p style=\"max-width:32em; color:var(--sivi); margin:0;\">Jelovnik menjamo za decu sa alergijama i posebnom ishranom, bez doplate.<\u002Fp>\n      <div style=\"display:flex; gap:20px; align-items:flex-end; margin-top:28px;\">\n        <svg width=\"64\" height=\"60\" sc-camel-view-box=\"0 0 70 66\" fill=\"none\" style=\"filter:url(#crayon); transform:rotate(-7deg);\"><path d=\"M35 58C15 43 8 28 17 20c7-6 14-1 18 5 4-6 11-11 18-5 9 8 2 23-18 38Z\" stroke=\"#D9564A\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <svg width=\"56\" height=\"60\" sc-camel-view-box=\"0 0 60 66\" fill=\"none\" style=\"filter:url(#crayon); transform:rotate(6deg);\"><path d=\"M30 18c-4-4-12-6-17 0-7 8-3 26 6 34 4 4 8 4 11 2 3 2 7 2 11-2 9-8 13-26 6-34-5-6-13-4-17 0Z\" stroke=\"var(--tamna)\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M30 18c0-6 2-10 6-13\" stroke=\"var(--tamna)\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M36 12c5-5 11-5 14-2-2 5-8 7-14 5\" stroke=\"#7BC96F\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"lokacija\" style=\"background:var(--mekana);\">\n    <div style=\"max-width:1100px; margin:0 auto; padding:var(--pad) 24px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:56px; align-items:center;\">\n      <div>\n        <div style=\"display:flex; align-items:center; gap:16px; margin:0 0 12px;\">\n          <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(30px,3.5vw,40px); margin:0;\">Gde smo<\u002Fh2>\n          <svg width=\"44\" height=\"52\" sc-camel-view-box=\"0 0 50 60\" fill=\"none\" style=\"filter:url(#crayon); transform:rotate(8deg);\"><path d=\"M25 6C15 6 8 13 8 22c0 12 17 32 17 32s17-20 17-32c0-9-7-16-17-16Z\" stroke=\"#D9564A\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"25\" cy=\"22\" r=\"6\" stroke=\"#D9564A\" stroke-width=\"3\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"max-width:32em; color:var(--sivi); margin:0 0 24px;\">U mirnoj ulici u Zemunu, pet minuta pešaka od Glavne ulice. Ispred vrtića ima mesta za kratko parkiranje kad dovodite dete.<\u002Fp>\n        <div style=\"display:grid; gap:12px; font-size:17px;\">\n          <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-weight:700; width:120px; flex-shrink:0;\">Adresa<\u002Fspan><span>Cara Dušana 41, Zemun<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-weight:700; width:120px; flex-shrink:0;\">Radno vreme<\u002Fspan><span>radnim danima {{ radnoVreme }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-weight:700; width:120px; flex-shrink:0;\">Telefon<\u002Fspan><a href=\"tel:+381113164287\">011 316 42 87<\u002Fa><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:baseline;\"><span style=\"font-weight:700; width:120px; flex-shrink:0;\">E-mail<\u002Fspan><a href=\"mailto:upis@maliprinc.rs\">upis@maliprinc.rs<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:340px;\">\n        <image-slot id=\"mapa\" shape=\"rounded\" radius=\"12\" placeholder=\"MAPA ili FOTOGRAFIJA ULAZA U VRTIĆ\"><\u002Fimage-slot>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"upit\" style=\"position:relative; max-width:1100px; margin:0 auto; padding:var(--pad) 24px;\">\n    <svg width=\"100\" height=\"76\" sc-camel-view-box=\"0 0 100 76\" fill=\"none\" style=\"position:absolute; top:calc(var(--pad) - 4px); right:56px; filter:url(#crayon); transform:rotate(-6deg);\"><path d=\"M8 38 88 10 60 66 46 46 8 38Z\" stroke=\"#3D6FCC\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M46 46 88 10\" stroke=\"#3D6FCC\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M14 58c6-2 10-2 14 0M10 68c8-3 14-3 20 0\" stroke=\"#E9AE2E\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n    <div style=\"max-width:640px; margin:0 auto;\">\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(30px,3.5vw,40px); margin:0 0 12px; text-align:center;\">Pošaljite upit<\u002Fh2>\n      <div style=\"text-align:center; margin:0 0 16px;\">\n        <div style=\"display:inline-block;\">\n          <span style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(30px,3.5vw,40px); visibility:hidden; display:block; height:0; overflow:hidden;\">Pošaljite upit<\u002Fspan>\n          <svg height=\"12\" sc-camel-view-box=\"0 0 247 12\" fill=\"none\" sc-camel-preserve-aspect-ratio=\"none\" style=\"display:block; width:100%;\"><path d=\"M2 8c12-8 23 8 35 0s23 8 35 0 23 8 35 0 23 8 35 0 23 8 35 0 23 8 35 0 22 8 35 0\" stroke=\"var(--zuta)\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"color:var(--sivi); margin:0 0 40px; text-align:center;\">Napišite nam uzrast deteta i kada biste želeli da dođete da vidite prostor. Odgovaramo isti dan, radnim danom do {{ radnoDo }}.<\u002Fp>\n      <sc-if value=\"{{ poslato }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px solid var(--zelena); background:var(--mekana); border-radius:12px; padding:32px; text-align:center;\">\n          <p style=\"font-family:'Baloo 2',sans-serif; font-weight:600; font-size:22px; margin:0 0 8px;\">Upit je poslat<\u002Fp>\n          <p style=\"margin:0; color:var(--sivi);\">Hvala. Javljamo se telefonom ili mejlom u toku dana.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ nijePoslato }}\" hint-placeholder-val=\"{{ true }}\">\n        <form sc-camel-on-submit=\"{{ posalji }}\" style=\"display:grid; gap:20px;\">\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px;\">\n            <label style=\"display:grid; gap:6px; font-weight:700; font-size:15px;\">Vaše ime\n              <input required=\"required\" type=\"text\" name=\"ime\" style=\"border:1px solid #C9C7BC; border-radius:8px; padding:12px 14px; font-size:17px; background:#fff;\">\n            <\u002Flabel>\n            <label style=\"display:grid; gap:6px; font-weight:700; font-size:15px;\">Telefon ili e-mail\n              <input required=\"required\" type=\"text\" name=\"kontakt\" style=\"border:1px solid #C9C7BC; border-radius:8px; padding:12px 14px; font-size:17px; background:#fff;\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <label style=\"display:grid; gap:6px; font-weight:700; font-size:15px;\">Uzrast deteta\n            <sc-raw-select name=\"uzrast\" style=\"border:1px solid #C9C7BC; border-radius:8px; padding:12px 14px; font-size:17px; background:#fff;\">\n              <option>1 do 3 godine<\u002Foption>\n              <option>3 do 5 godina<\u002Foption>\n              <option>5 do 7 godina<\u002Foption>\n            <\u002Fsc-raw-select>\n          <\u002Flabel>\n          <label style=\"display:grid; gap:6px; font-weight:700; font-size:15px;\">Poruka\n            <textarea name=\"poruka\" rows=\"4\" placeholder=\"Na primer: kada možemo da dođemo da vidimo vrtić\" style=\"border:1px solid #C9C7BC; border-radius:8px; padding:12px 14px; font-size:17px; background:#fff; resize:vertical;\"><\u002Ftextarea>\n          <\u002Flabel>\n          <button type=\"submit\" style=\"background:var(--tamna); color:#fff; border:none; border-radius:8px; padding:16px; font-size:18px; font-weight:700; cursor:pointer; font-family:'Karla',sans-serif;\" style-hover=\"{{ ctaHover }}\">Pošaljite upit<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1px solid #E4E2D8;\">\n    <div style=\"max-width:1100px; margin:0 auto; padding:32px 24px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; color:var(--sivi); font-size:15px;\">\n      <span style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:18px; color:var(--tekst);\">Mali Princ<\u002Fspan>\n      <span>Cara Dušana 41, Zemun · <a href=\"tel:+381113164287\">011 316 42 87<\u002Fa> · <a href=\"mailto:upis@maliprinc.rs\">upis@maliprinc.rs<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440},&quot;paleta&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;#7BC96F&quot;,&quot;#4E9B45&quot;],&quot;tsType&quot;:&quot;string[]&quot;,&quot;options&quot;:[[&quot;#7BC96F&quot;,&quot;#4E9B45&quot;],[&quot;#5BA8FF&quot;,&quot;#3D6FCC&quot;],[&quot;#FFD166&quot;,&quot;#C98A1B&quot;]],&quot;section&quot;:&quot;Izgled&quot;},&quot;radnoVreme&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;6.30 do 17.30&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Podaci&quot;},&quot;kompaktno&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Izgled&quot;}}\">\nclass Component extends DCLogic {\n  state = { poslato: false, meniOtvoren: false, mobilno: typeof window !== 'undefined' && window.innerWidth < 768 };\n  primeniPaletu() {\n    const p = this.props.paleta;\n    if (Array.isArray(p) && p.length >= 2) {\n      const r = document.documentElement.style;\n      r.setProperty('--zelena', p[0]);\n      r.setProperty('--tamna', p[1]);\n    }\n    document.documentElement.style.setProperty('--pad', (this.props.kompaktno ? 72 : 112) + 'px');\n  }\n  componentDidMount() {\n    this.primeniPaletu();\n    this._mq = window.matchMedia('(max-width: 767px)');\n    this._naPromenu = () => this.setState({ mobilno: this._mq.matches, meniOtvoren: false });\n    this._mq.addEventListener('change', this._naPromenu);\n    this.setState({ mobilno: this._mq.matches });\n  }\n  componentWillUnmount() { if (this._mq) this._mq.removeEventListener('change', this._naPromenu); }\n  componentDidUpdate() { this.primeniPaletu(); }\n  renderVals() {\n    const radnoVreme = this.props.radnoVreme ?? '6.30 do 17.30';\n    return {\n      radnoVreme,\n      radnoDo: radnoVreme.split(' do ')[1] ?? '17.30',\n      poslato: this.state.poslato,\n      mobilno: this.state.mobilno,\n      nijeMobilno: !this.state.mobilno,\n      meniOtvoren: this.state.mobilno && this.state.meniOtvoren,\n      meniZatvoren: !this.state.meniOtvoren,\n      prebaciMeni: () => this.setState(s => ({ meniOtvoren: !s.meniOtvoren })),\n      zatvoriMeni: () => this.setState({ meniOtvoren: false }),\n      stavkaHover: { background: 'var(--mekana)' },\n      nijePoslato: !this.state.poslato,\n      posalji: (e) => { e.preventDefault(); this.setState({ poslato: true }); },\n      ctaHover: { background: '#3B7A34' }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
